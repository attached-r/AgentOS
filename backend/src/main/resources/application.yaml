# 启动端口
server:
  port: 8099


spring:
  application:
    name: backend
  datasource:  # 配置数据库连接信息
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: ${POSTGRESQL_PASSWORD:123456789rj}
    driver-class-name: org.postgresql.Driver

# Redis 连接配置（sa-token token 默认存储在此）
spring.data.redis:
  host: localhost
  port: 6379
  timeout: 5000ms
  database: 3
  password: ${REDIS_PASSWORD:20050603RJ}


# mybatis-plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 打印sql
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# sa-token 配置
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: agentos-token
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 259200 # 三天
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true

# springdoc 接口文档
springdoc:
  api-docs:
    path: /v1/api-docs      # 接口json路径  http://localhost:8099/v1/api-docs
  swagger-ui:
    path: /swagger-ui.html    # 访问路径  http://localhost:8099/swagger-ui.html
    operations-sorter: method

# Python AI Runtime 配置
runtime:
  base-url: http://localhost:8000